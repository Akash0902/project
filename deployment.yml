apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-deployment
  namespace: project
  labels:
    app: project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: project
  template:
    metadata:
      labels:
        app: project
    spec:
      imagePullSecrets:
        - name: nexus-creds
      containers:
        - name: project
          image: 13.201.63.237:8000/project:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: project-svc
  namespace: project
spec:
  type: NodePort
  selector:
    app: project
  ports:
    - port: 80
      targetPort: 8082
      nodePort: 8083
