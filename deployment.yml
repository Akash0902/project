apiVersion: v1
kind: Namespace
metadata:
  name: project
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-deployment
  namespace: project
  labels:
    app: project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: project
  template:
    metadata:
      labels:
        app: project
    spec:
      imagePullSecrets:
        - name: nexus-creds
      containers:
        - name: project
          image: 15.206.166.35:8000/project:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: project-svc
  namespace: project
spec:
  type: NodePort
  selector:
    app: project
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30083
